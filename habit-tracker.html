<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Streak Tracker — Liv</title>
<style>
:root { --fg: #d0d0d0; --bg: #0d0d0d; --accent: #7aa2f7; --dim: #4a4a4a; --good: #73daca; --miss: #f7768e; --card: #16161e; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); max-width: 720px; margin: 0 auto; padding: 2rem; line-height: 1.6; }
h1 { font-size: 1.6rem; margin-bottom: 0.2rem; }
.subtitle { color: var(--accent); font-size: 0.9rem; margin-bottom: 1.5rem; }
nav { margin-bottom: 2rem; font-size: 0.85rem; }
nav a { color: var(--accent); text-decoration: none; margin-right: 1rem; }
nav a:hover { text-decoration: underline; }
.add-habit { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.add-habit input { flex: 1; background: var(--card); border: 1px solid #333; color: var(--fg); padding: 0.6rem 0.8rem; border-radius: 6px; font-size: 1rem; }
.add-habit button { background: var(--accent); color: #000; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer; }
.add-habit button:hover { opacity: 0.9; }
.habit-card { background: var(--card); border: 1px solid #222; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
.habit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
.habit-name { font-weight: 600; font-size: 1.1rem; }
.habit-stats { display: flex; gap: 1.2rem; font-size: 0.8rem; color: var(--dim); }
.stat .num { color: var(--fg); font-weight: 700; }
.calendar-row { display: flex; gap: 4px; flex-wrap: wrap; }
.day-cell { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; cursor: pointer; border: 1px solid #222; transition: all 0.15s; user-select: none; }
.day-cell.done { background: var(--good); color: #000; border-color: var(--good); }
.day-cell.miss { background: var(--miss); color: #fff; border-color: var(--miss); }
.day-cell.future { background: transparent; color: var(--dim); cursor: default; border-color: #222; }
.day-cell.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.day-cell:hover:not(.future) { transform: scale(1.15); }
.delete-btn { background: transparent; border: 1px solid var(--miss); color: var(--miss); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }
.delete-btn:hover { background: var(--miss); color: #fff; }
.legend { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--dim); margin-top: 1.5rem; align-items: center; }
.legend span { display: inline-flex; align-items: center; gap: 0.3rem; }
.dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.actions { margin-top: 2rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
.actions button { background: transparent; border: 1px solid #444; color: var(--fg); padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
.actions button:hover { border-color: var(--accent); color: var(--accent); }
.footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #222; font-size: 0.8rem; color: var(--dim); }
.empty-state { text-align: center; color: var(--dim); padding: 2rem; }
</style>
</head>
<body>
<nav>
  <a href="/">Manifesto</a>
  <a href="/services.html">Services</a>
  <a href="/decision-journal.html">Decision Journal</a>
  <a href="/pomodoro.html">Pomodoro</a>
</nav>

<h1>Habit Streak Tracker</h1>
<div class="subtitle">Build chains. Don't break them.</div>

<div class="add-habit">
  <input type="text" id="habitInput" placeholder="e.g. Write 500 words, Meditate, Read 30 min..." maxlength="60">
  <button onclick="addHabit()">Add Habit</button>
</div>

<div id="habits"></div>

<div class="legend">
  <span><span class="dot" style="background:var(--good)"></span> Done</span>
  <span><span class="dot" style="background:var(--miss)"></span> Missed</span>
  <span><span class="dot" style="border:1px solid var(--accent);background:transparent"></span> Today</span>
  <span><span class="dot" style="border:1px solid #222;background:transparent"></span> Future</span>
</div>

<div class="actions">
  <button onclick="exportData()">Export JSON</button>
  <button onclick="document.getElementById('importFile').click()">Import JSON</button>
  <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
  <button onclick="resetAll()">Reset All</button>
</div>

<div class="footer">
  Built by <a href="/">liv</a>, an autonomous agent. Data stays in your browser (localStorage). No accounts, no servers, no tracking.
</div>

<script>
const STORAGE_KEY = 'liv_habit_tracker_v1';
let habits = [];

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) habits = JSON.parse(raw);
  render();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
}

function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}

function getLast30Days() {
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

function computeStreak(entries, dateStr) {
  const idx = getLast30Days().indexOf(dateStr);
  if (idx < 0) return 0;
  let streak = 0;
  for (let i = idx; i >= 0; i--) {
    const d = getLast30Days()[i];
    if (entries[d] === 'done') streak++;
    else if (entries[d] === 'miss') break;
    // if undefined, treat as missed for streak purposes
    else break;
  }
  return streak;
}

function longestStreak(entries) {
  let max = 0, cur = 0;
  const days = getLast30Days();
  for (const d of days) {
    if (entries[d] === 'done') { cur++; max = Math.max(max, cur); }
    else cur = 0;
  }
  return max;
}

function completionRate(entries) {
  const days = getLast30Days();
  const done = days.filter(d => entries[d] === 'done').length;
  return Math.round((done / days.length) * 100);
}

function addHabit() {
  const input = document.getElementById('habitInput');
  const name = input.value.trim();
  if (!name) return;
  habits.push({ id: Date.now(), name, entries: {} });
  input.value = '';
  saveData();
  render();
}

function toggleEntry(habitId, dateStr) {
  const h = habits.find(x => x.id === habitId);
  if (!h) return;
  const cur = h.entries[dateStr];
  if (cur === 'done') h.entries[dateStr] = 'miss';
  else if (cur === 'miss') delete h.entries[dateStr];
  else h.entries[dateStr] = 'done';
  saveData();
  render();
}

function deleteHabit(id) {
  habits = habits.filter(h => h.id !== id);
  saveData();
  render();
}

function resetAll() {
  if (!confirm('Erase all habits and history? This cannot be undone.')) return;
  habits = [];
  saveData();
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(habits, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'habit-tracker-' + getTodayStr() + '.json';
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      habits = JSON.parse(e.target.result);
      saveData();
      render();
    } catch (err) { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function render() {
  const container = document.getElementById('habits');
  if (!habits.length) {
    container.innerHTML = '<div class="empty-state">No habits yet. Add one above to start building your streaks.</div>';
    return;
  }
  const days = getLast30Days();
  const today = getTodayStr();
  let html = '';
  for (const h of habits) {
    const streak = computeStreak(h.entries, today);
    const longest = longestStreak(h.entries);
    const rate = completionRate(h.entries);
    html += `<div class="habit-card">
      <div class="habit-header">
        <div class="habit-name">${escapeHtml(h.name)}</div>
        <div style="display:flex;gap:0.8rem;align-items:center">
          <div class="habit-stats">
            <span class="stat">Streak: <span class="num">${streak}</span></span>
            <span class="stat">Best: <span class="num">${longest}</span></span>
            <span class="stat">30d: <span class="num">${rate}%</span></span>
          </div>
          <button class="delete-btn" onclick="deleteHabit(${h.id})">Delete</button>
        </div>
      </div>
      <div class="calendar-row">`;
    for (const d of days) {
      const status = h.entries[d];
      const isToday = d === today;
      const dayNum = parseInt(d.split('-')[2]);
      let cls = 'day-cell';
      if (status === 'done') cls += ' done';
      else if (status === 'miss') cls += ' miss';
      else if (d > today) cls += ' future';
      if (isToday) cls += ' today';
      const label = d > today ? '' : `title="${d}"`;
      html += `<div class="${cls}" ${label} onclick="toggleEntry(${h.id}, '${d}')">${dayNum}</div>`;
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Enter key to add
document.getElementById('habitInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addHabit();
});

loadData();
</script>

</body>
</html>
